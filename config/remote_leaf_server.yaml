server:
  id: "remote-leaf-server"
  description: "Remote Leaf Server"

# Authentication credentials are defined in authentication.yaml in the same
# directory. Edit that file to change users, API keys, or public keys.

# Per-subtype top-level configuration

loopback_ports:
  - name: "remote_loopback"
    description: "Remote loopback port - data goes in and comes back out"
    echo_delay: 0.0
    buffer_size: 1024
    max_read_write_users: 5
  - name: "test_port"
    description: "Test loopback port exposed for OpenMux client tests"
    echo_delay: 0.0
    buffer_size: 1024
    max_read_write_users: 5

command_ports:
  - name: "remote_command"
    description: "Remote command execution port"
    command: "zsh"
    shell: true
    max_read_write_users: 2

client_listener:
  host: "127.0.0.1"
  port: 8123
  max_connections: 100
  connection_timeout: 30

muxcon:
  auth:
    private_key: "./id_ed25519_openmux_client"
    key_id: "remote_leaf_server_key"
  public_keys:
    - key_id: "loopback_test_key"
      public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGQI6FeEv+E43SRpww5uTgv6sKTDdSe/EQvKGL8Vt81O"
  advertise_filters:
    include: ["remote_*", "test_port", "remote_command"]
    exclude: ["debug_*"]
  accept_filters:
    server_include: ["loopback-test-server"]
  listeners:
    - enabled: false
      host: "127.0.0.1"
      port: 7822
      use_tls: true
      # Predefine TLS storage if enabling later
      tls_dir: "~/.openmux/muxcon/remote_leaf"
      tls_known_peers_path: "~/.openmux/muxcon/remote_leaf/known_peers.yaml"
  initiators:
    #- # identity is server.id; node_name deprecated
    #  host: 10.20.0.181
    #  port: 7822
    #  use_tls: true
    #  ssl_verify: false
    #  tls_tofu: true
    #  tls_known_peers_path: "~/.openmux/muxcon/remote_leaf/known_peers.yaml"
    #  # Capability fields per spec (placeholders for future implementation)
    #  share_ports: ["remote_*"]
    #  accept_ports: []
    #  request_ports: []
    - # identity is server.id; node_name deprecated
      host: "127.0.0.1"
      port: 7823
      use_tls: true
      ssl_verify: false
      tls_tofu: true
      tls_known_peers_path: "~/.openmux/muxcon/remote_leaf/known_peers.yaml"
      # Capability fields per spec (placeholders for future implementation)
      share_ports: ["remote_*"]
      accept_ports: []
      request_ports: []

logging:
  level: "INFO"
  file: "/tmp/openmux_remote_leaf.log"
  console: true

web_console:
  enable_ui: true
  host: 0.0.0.0
  port: 8080
  ssl_port: 8443
  use_tls: true
  tls_autogen: true
  respect_forwarded_prefix: true
  realm: OpenMux
