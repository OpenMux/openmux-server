# OpenMux Server Configuration (loopback_test style)

server:
  id: "primary-server"
  description: "Primary OpenMux Server"

# Per-subtype top-level configuration

loopback_ports:
  - name: "loopback"
    description: "Loopback Test Console"
    echo_delay: 0.0
    buffer_size: 1024
    max_read_write_users: 5
    # Optional per-port data log file; defaults to logs/ports/<name>.log if omitted
    # log_file: "logs/ports/loopback.jsonl"
    # To log only outbound data uncomment:
    # log_direction: out

serial_ports:
  - name: "console1"
    description: "Main Server Console"
    device: "/dev/ttyS0"
    baudrate: 9600
    bytesize: 8
    parity: "N"
    stopbits: 1
    read_write_users: 5
  
    # log_file: "logs/ports/console1.jsonl"
    # log_directions: [in, out]

## Note: unified schema no longer supports `openmux_client_ports` top-level entries.

logging:
  level: "INFO"
  file: "logs/openmux_server.log"
  console: true

# TCP console endpoint (required for clients to connect)
client_listener:
  host: "127.0.0.1"
  port: 8023
  max_connections: 200
  connection_timeout: 30

# Web console with Config Editor plugin enabled
web_console:
  enable_probes: true
  enable_ui: true
  host: 0.0.0.0
  plugins:
  - openmux.server.web_plugins.config_editor
  port: 80
  probes_include_details: true
  realm: OpenMux
  respect_forwarded_prefix: false
  ssl_port: 443
  static_dir: static
  template_dir: templates/web_console/
  tls_autogen: true
  use_tls: true