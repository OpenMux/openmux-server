"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "https://openmux.org/schema/authentication-config"
title: OpenMux Authentication Configuration Schema
description: >
  Defines the structure of authentication.yaml containing OpenMux user
  credentials, API keys, public keys, and external authentication settings.
type: object
additionalProperties: false
properties:
  users:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [username, password_hash]
      properties:
        username: { type: string }
        password_hash: { type: string, pattern: "^[0-9a-fA-F]{64}$" }
        permissions: { type: string, enum: [admin, read-write, read-only] }
  api_keys:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [key]
      properties:
        name: { type: string }
        key: { type: string }
        permissions: { type: string, enum: [admin, read-write, read-only] }
  public_keys:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [key_id, public_key]
      properties:
        username: { type: string }
        key_id: { type: string }
        public_key: { type: string }
        allowed_uses:
          type: array
          items: { type: string, enum: [client, muxcon] }
          uniqueItems: true
  external_auth:
    type: object
    additionalProperties: false
    description: >
      External authentication via a helper binary (e.g. openmux-pam-helper).
      The helper is called as: <helper> <service> <username>
      with the password on stdin. Exit 0 = success.
    properties:
      enabled: { type: boolean, default: false }
      helper:
        type: string
        description: >
          Path to the auth helper binary. Defaults to openmux-pam-helper on
          PATH, then /usr/lib/openmux/openmux-pam-helper.
      service: { type: string, default: openmux }
      timeout: { type: number, default: 10, description: "Seconds before treating no response as failure" }
      allow_root: { type: boolean, default: false }
      allowed_users:
        type: array
        items: { type: string }
        uniqueItems: true
      groups:
        type: object
        additionalProperties: false
        properties:
          admin_group: { type: string, default: openmux_admin }
          write_group: { type: string, default: openmux_write }
          read_group: { type: string, default: openmux_read }
  pam:
    type: object
    description: "Deprecated alias for external_auth. Use external_auth instead."
    additionalProperties: true
anyOf:
  - required: [users]
  - required: [api_keys]
  - required: [public_keys]
  - required: [external_auth]
  - required: [pam]
