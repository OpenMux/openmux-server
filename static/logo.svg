<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OpenMux icon: rounded square with branching traces and nodes -->
  <defs>
    <style>
      .stroke { stroke: #2E7BDB; }
    </style>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="10" ry="10" class="stroke" stroke-width="6" fill="none"/>
  <!-- left node -->
  <circle cx="16" cy="32" r="5" class="stroke" stroke-width="6" fill="none"/>
  <!-- traces -->
  <path d="M16 32 H32 L44 20" class="stroke" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M32 32 L44 44" class="stroke" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- right nodes -->
  <circle cx="48" cy="20" r="5" class="stroke" stroke-width="6" fill="none"/>
  <circle cx="48" cy="44" r="5" class="stroke" stroke-width="6" fill="none"/>
</svg>
