[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=openmux --cov-report=term-missing
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    server: marks tests as server-related
    client: marks tests as client-related
    management: marks tests as management-related
    slow: marks tests as slow (skipped by default)
asyncio_default_fixture_loop_scope = function
